basePath: /api
definitions:
  api.AdoptRequest:
    properties:
      content:
        type: string
      name:
        type: string
    type: object
  api.LoginRequest:
    properties:
      login:
        type: string
      password:
        type: string
    type: object
  api.ResolveResponse:
    properties:
      domain:
        type: string
      error:
        type: string
      ips:
        items:
          type: string
        type: array
    type: object
  api.SaveStatusDTO:
    properties:
      lastError:
        type: string
      lastSaveAt:
        type: string
      pendingCount:
        type: integer
      state:
        type: string
    type: object
info:
  contact: {}
  description: HTTP API for the AWG Manager daemon (tunnels, routing, system).
  title: AWG Manager API
  version: "1.0"
paths:
  /access-policies:
    get:
      description: KeeneticOS 5 only when route is registered.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              additionalProperties: true
              type: object
            type: array
      security:
      - CookieAuth: []
      summary: List access policies
      tags:
      - access-policy
  /access-policies/assign:
    delete:
      parameters:
      - description: Device MAC
        in: query
        name: mac
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - CookieAuth: []
      summary: Unassign device from policy
      tags:
      - access-policy
    post:
      consumes:
      - application/json
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
